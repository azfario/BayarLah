services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: bayarlah-app-dev:local
    env_file:
      - .env.local
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      OPENWA_API_BASE_URL: "http://openwa-api:2785/api"
      OPENWA_API_KEY: "dev-admin-key"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    command: sh -c "npx prisma generate && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      - openwa-api
      - whatsapp-worker

  openwa-api:
    image: ghcr.io/rmyndharis/openwa:latest
    environment:
      NODE_ENV: "development"
      PORT: "2785"
      DATABASE_TYPE: "sqlite"
      DATABASE_NAME: "/app/data/openwa.sqlite"
      DATABASE_SYNCHRONIZE: "true"
      ENGINE_TYPE: "whatsapp-web.js"
      SESSION_DATA_PATH: "/app/data/sessions"
      PUPPETEER_HEADLESS: "true"
      PUPPETEER_ARGS: "--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu"
      STORAGE_TYPE: "local"
      STORAGE_LOCAL_PATH: "/app/data/media"
      PLUGINS_ENABLED: "true"
      PLUGINS_DIR: "/app/data/plugins"
    ports:
      - "2785:2785"
    volumes:
      - openwa_data:/app/data
    restart: unless-stopped

  whatsapp-worker:
    build:
      context: .
      dockerfile: workers/whatsapp/Dockerfile
    image: bayarlah-whatsapp-worker:local
    env_file:
      - .env.local
    environment:
      OPENWA_API_BASE_URL: "http://openwa-api:2785/api"
      OPENWA_API_KEY: "dev-admin-key"
      WHATSAPP_LOG_EMPTY_POLLS: "true"
      WHATSAPP_WORKER_INTERVAL_MS: "5000"
      WHATSAPP_RETRY_DELAY_MS: "60000"
      WHATSAPP_MAX_PER_RUN: "20"
    depends_on:
      - openwa-api
    restart: unless-stopped

volumes:
  app_node_modules:
  app_next:
  openwa_data:
