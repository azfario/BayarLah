services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: bayarlah-app-dev:local
    env_file:
      - .env.local
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      WHATSAPP_WORKER_BASE_URL: "http://whatsapp-worker:3010"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    command: sh -c "npx prisma generate && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      - whatsapp-worker

  whatsapp-worker:
    build:
      context: .
      dockerfile: workers/whatsapp/Dockerfile
    image: bayarlah-whatsapp-worker:local
    env_file:
      - .env.local
    environment:
      WHATSAPP_WORKER_API_PORT: "3010"
      WHATSAPP_WORKER_BASE_URL: "http://whatsapp-worker:3010"
      WHATSAPP_SESSION_DATA_PATH: "/app/workers/whatsapp/sessions"
      WHATSAPP_CHROME_PATH: "/usr/bin/chromium"
      WHATSAPP_HEADLESS: "true"
      WHATSAPP_LOG_EMPTY_POLLS: "true"
      WHATSAPP_WORKER_INTERVAL_MS: "5000"
      WHATSAPP_RETRY_DELAY_MS: "60000"
      WHATSAPP_MAX_PER_RUN: "20"
    ports:
      - "3010:3010"
    volumes:
      - whatsapp_sessions:/app/workers/whatsapp/sessions
      - whatsapp_node_persist:/app/workers/whatsapp/.node-persist
    restart: unless-stopped

volumes:
  app_node_modules:
  app_next:
  whatsapp_sessions:
  whatsapp_node_persist:
