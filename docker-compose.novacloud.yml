services:
  openwa-api:
    image: ghcr.io/rmyndharis/openwa:latest
    env_file:
      - .env.novacloud
    environment:
      NODE_ENV: "production"
      PORT: "2785"
      DATABASE_TYPE: "sqlite"
      DATABASE_NAME: "/app/data/openwa.sqlite"
      DATABASE_SYNCHRONIZE: "true"
      ENGINE_TYPE: "whatsapp-web.js"
      SESSION_DATA_PATH: "/app/data/sessions"
      PUPPETEER_HEADLESS: "true"
      PUPPETEER_ARGS: "--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu"
      STORAGE_TYPE: "local"
      STORAGE_LOCAL_PATH: "/app/data/media"
      PLUGINS_ENABLED: "true"
      PLUGINS_DIR: "/app/data/plugins"
    expose:
      - "2785"
    volumes:
      - openwa_data:/app/data
    restart: unless-stopped

  whatsapp-worker:
    build:
      context: .
      dockerfile: workers/whatsapp/Dockerfile
    image: bayarlah-whatsapp-worker:novacloud
    env_file:
      - .env.novacloud
    environment:
      OPENWA_API_BASE_URL: "http://openwa-api:2785/api"
      OPENWA_API_KEY_FILE: "/openwa-data/.api-key"
    depends_on:
      - openwa-api
    volumes:
      - openwa_data:/openwa-data:ro
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    env_file:
      - .env.novacloud
    depends_on:
      - openwa-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  openwa_data:
  caddy_data:
  caddy_config:
